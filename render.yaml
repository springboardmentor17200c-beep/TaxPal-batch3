# TaxPal — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: taxpal-api
    runtime: node
    rootDir: BackEnd
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://taxpal-batch3-1.onrender.com

  - type: web
    name: taxpal-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://taxpal-batch3.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
